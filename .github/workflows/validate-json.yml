name: Validate JSON Data Files

on:
  pull_request:
    paths:
      - 'src/assets/data/**'
  push:
    branches:
      - main
    paths:
      - 'src/assets/data/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON structure
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          function validateVideo(filePath) {
            const content = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            const required = ['video_title', 'video_artist', 'video_id', 'video_publish_date_str', 'song_timeline'];
            const missing = required.filter(field => !content[field]);
            
            if (missing.length > 0) {
              console.error('Missing fields in', filePath + ':', missing.join(', '));
              return false;
            }
            
            // Validate YouTube ID format (11 characters)
            if (!/^[a-zA-Z0-9_-]{11}$/.test(content.video_id)) {
              console.error('Invalid video_id format in', filePath);
              return false;
            }
            
            // Validate date format (YYYY-MM-DD, YYYY-MM-DD HH:MM:SS, or YYYY-MM-DD_N)
            if (!/^\d{4}-\d{2}-\d{2}(?:\s\d{2}:\d{2}:\d{2})?(?:_\d+)?$/.test(content.video_publish_date_str)) {
              console.error('Invalid date format in', filePath);
              console.error('Expected format: YYYY-MM-DD or YYYY-MM-DD HH:MM:SS or YYYY-MM-DD_N');
              console.error('Got:', content.video_publish_date_str);
              return false;
            }
            
            console.log('Valid:', filePath);
            return true;
          }
          
          const dataDir = 'src/assets/data';
          let hasError = false;
          
          function walkDir(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                walkDir(fullPath);
              } else if (file.endsWith('.json')) {
                if (!validateVideo(fullPath)) {
                  hasError = true;
                }
              }
            }
          }
          
          walkDir(dataDir);
          
          if (hasError) {
            process.exit(1);
          }
          console.log('All JSON files are valid!');
          "
